name: receipt_pro
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8    
  http: ^1.3.0
  flutter_html: ^3.0.0  
  isar: ^3.1.0
  in_app_purchase: ^3.1.0
  pdf: ^3.10.4
  printing: ^5.10.2
  path_provider: ^2.1.1
  flutter_riverpod: ^2.6.1
  go_router: ^13.0.0
  file_picker: ^10.1.9
  intl: ^0.19.0
  flutter_i18n: ^0.36.2  
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2  
  shared_preferences: ^2.5.3
  provider: ^6.1.5
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.15.0
  googleapis_auth: ^2.0.0
  
  # isar_flutter_libs: ^3.1.0+1


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/i18n/
    - assets/receipt-pro-service-key.json

  # To add custom fonts to your application, add a fonts section here,
